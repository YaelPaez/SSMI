name: Deploy SSMI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ssmi.site
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /srv/ssmi/deploy.sh